name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches plugin version
        run: |
          ver="$(grep -E '^ \* Version:' framix-blocks.php | grep -oE '[0-9][0-9.]*')"
          const="$(grep -oE "define\( 'FRAMIX_BLOCKS_VERSION', '[0-9][0-9.]*' \)" framix-blocks.php | grep -oE "[0-9][0-9.]*")"
          [ "$ver" = "$const" ] || { echo "Version header ($ver) != FRAMIX_BLOCKS_VERSION ($const)"; exit 1; }
          [ "v$ver" = "$GITHUB_REF_NAME" ] || { echo "Tag $GITHUB_REF_NAME != plugin version v$ver"; exit 1; }
      - name: PHP lint
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
      - name: Build zip
        run: |
          mkdir -p build/framix-blocks
          rsync -a --exclude='.git*' --exclude='.github' --exclude='build' ./ build/framix-blocks/
          cd build && zip -rq framix-blocks.zip framix-blocks
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" build/framix-blocks.zip --title "$GITHUB_REF_NAME" --generate-notes
